<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComplianceGate | KYB Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* Root variables for theme colors */
    :root { --primary: #004a99; --bg: #f3f4f6; --error: #e53e3e; }

    /* General page styling */
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }

    /* Card container */
    .card { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); overflow: hidden; }

    /* Header section */
    .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }

    /* Content section */
    .content { padding: 30px; }

    /* Input group spacing */
    .input-group { margin-bottom: 20px; }

    /* Hidden utility class */
    .hidden { display: none !important; }

    /* Labels */
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #4a5568; }

    /* Inputs */
    input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #cbd5e0; box-sizing: border-box; }
    input[readonly] { background-color: #f7fafc; cursor: not-allowed; border-style: dashed; }

    /* Upload zone styling */
    .upload-zone { border: 2px dashed #cbd5e0; border-radius: 12px; padding: 30px; text-align: center; background: #fafbfc; cursor: pointer; }

    /* File list display */
    #fileList { font-size: 12px; color: #718096; margin-top: 10px; line-height: 1.4; }

    /* Progress bar */
    .progress-container { width: 100%; background: #edf2f7; border-radius: 10px; margin-top: 15px; display: none; }
    .progress-bar { width: 0%; height: 8px; background: var(--primary); border-radius: 10px; transition: width 0.3s; }

    /* Buttons */
    button { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #a0aec0; }

    /* Status text */
    #status { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1 id="pTitle">Compliance Portal</h1>
    <p id="pSub">KYB Verification System</p>
  </div>
  <div class="content">
    <form id="uploadForm">
      
      <!-- EMAIL FIELD (currently commented out) -->
      <!--
      <div class="input-group">
        <label>Email Address <span>*</span></label>
        <input type="email" id="email" required />
      </div>
      -->

      <!-- Customer ID field (hidden until URL param is present) -->
    
      <!-- File upload section -->
      <div class="input-group">
        <label>Verification Documents <span>*</span></label>
        <div class="upload-zone" onclick="document.getElementById('files').click()">
          <span style="font-size:30px;">📤</span><br><strong>Click to Upload</strong>
          <input type="file" id="files" multiple style="display:none;" />
        </div>
        <div id="fileList">No files selected.</div>
      </div>

      <!-- Progress bar -->
      <div class="progress-container" id="pCont"><div class="progress-bar" id="pBar"></div></div>

      <!-- Submit button -->
      <button type="button" id="btn" onclick="upload()">Submit Documentation</button>
      <div id="status"></div>
    </form>
  </div>
</div>

<script>
  // Handle URL Params
  const params = new URLSearchParams(window.location.search);
  if (params.get("Customer_ID")) {
    document.getElementById("pTitle").innerText = "Complete Your Audit";
    document.getElementById("idGroup").classList.remove("hidden");
    // If email field is uncommented, populate it
    if (params.get("Email") && document.getElementById("email")) {
      document.getElementById("email").value = params.get("Email");
    }
  }

  // File selection handler
  document.getElementById("files").onchange = function() {
    const names = Array.from(this.files).map(f => f.name);
    document.getElementById("fileList").innerHTML = names.length ? "Selected:<br>" + names.join("<br>") : "No files selected.";
  };

  // Upload function
  function upload() {
    const url = "https://studio.deepopinion.ai/builder/webhook/11bbfe4d-99ba-4946-8175-080368d82995";
    const btn = document.getElementById("btn");
    const files = document.getElementById("files").files;

    // Check for email field only if it exists
    const emailField = document.getElementById("email");
    if ((emailField && !emailField.value) || !files.length) {
      return Swal.fire("Error", "Please fill all fields and select files.", "error");
    }

    btn.disabled = true;
    document.getElementById("pCont").style.display = "block";

    const xhr = new XMLHttpRequest();
    const fd = new FormData();
    if (emailField) fd.append("Email", emailField.value);
    
    for (let i = 0; i < files.length; i++) fd.append(`file_${i}`, files[i]);

    xhr.upload.onprogress = (e) => {
      const p = Math.round((e.loaded / e.total) * 100);
      document.getElementById("pBar").style.width = p + "%";
      document.getElementById("status").innerText = "Uploading: " + p + "%";
    };

    xhr.onreadystatechange = () => {
      if (xhr.readyState === 4) {
        if (xhr.status >= 200 && xhr.status < 300) {
          Swal.fire( "Success", "Thank you for uploading your documents. We will review them and provide an update shortly. Please acknowledge receipt of this message via email.", "success" );
          document.getElementById("uploadForm").style.opacity = "0.5";
          btn.innerText = "Upload Complete";
        } else {
          Swal.fire("Connection Error", "Ensure Webhook Method is set to POST in Otera.", "error");
          btn.disabled = false;
        }
      }
    };

    xhr.open("POST", url);
    xhr.send(fd);
  }
</script>
</body>
</html>
